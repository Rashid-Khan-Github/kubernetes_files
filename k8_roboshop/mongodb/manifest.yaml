apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  namespace: roboshop
  labels:           # these lables are deployment labels                 
    app: mongodb
    tier: db
    project: roboshop

spec:
  replicas: 1
  selector:
    matchLabels:    # these labels should match with pod labels
      app: mongodb
      tier: db
      project: roboshop
  template:         # this is a pod definition
    metadata:
      labels:
       app: mongodb
       tier: db
       project: roboshop
    spec:
      containers:
      - name: mongodb
        image: dockerjacakl/mongodb:1.0.0


---

apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: roboshop
spec:
  selector:
    app: mongodb
    tier: db
    project: roboshop
ports:
- name: mongodb-service-port
  protocol: TCP
  port: 27017                 # this port no belongs to service
  targetPort: 27017           # this port belongs to container
